<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>临时邮箱</title>
<style>
body { font-family: Arial; max-width: 800px; margin: 40px auto; }
button { padding: 10px; margin: 5px; cursor: pointer; }
#log { color: red; }
</style>
</head>
<body>

<h2>📧 临时邮箱（过滤 sharebot.net）</h2>

<button onclick="createEmail()">生成邮箱</button>
<p id="email"></p>
<div id="log"></div>

<script>
let token = "";
let address = "";

function log(msg) {
    document.getElementById("log").innerText = msg;
}

async function createEmail() {
    try {
        log("获取域名中...");

        let res = await fetch("https://api.mail.tm/domains");
        let data = await res.json();

        let domains = data["hydra:member"]
            .map(d => d.domain)
            .filter(d => !d.includes("sharebot.net")); // 🔥 过滤

        if (domains.length === 0) {
            throw new Error("没有可用域名（已全部被过滤）");
        }

        let domain = domains[Math.floor(Math.random() * domains.length)];

        let username = "user" + Math.random().toString(36).substring(2, 8);
        address = username + "@" + domain;

        let password = "123456";

        log("注册邮箱中...");

        await fetch("https://api.mail.tm/accounts", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ address, password })
        });

        log("登录中...");

        let loginRes = await fetch("https://api.mail.tm/token", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ address, password })
        });

        let loginData = await loginRes.json();

        if (!loginData.token) {
            throw new Error("登录失败");
        }

        token = loginData.token;

        document.getElementById("email").innerText = "邮箱: " + address;
        log("✅ 成功生成（已过滤 sharebot）");

    } catch (e) {
        log("❌ " + e.message);
    }
}
</script>

</body>
</html>
