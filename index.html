<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>临时邮箱</title>
<style>
    body {
        font-family: Arial;
        max-width: 800px;
        margin: 40px auto;
    }
    button {
        padding: 10px 15px;
        margin: 10px 5px;
        cursor: pointer;
    }
    .mail {
        border: 1px solid #ccc;
        padding: 10px;
        margin-top: 10px;
    }
</style>
</head>
<body>

<h2>📧 临时邮箱（1secmail）</h2>

<button onclick="genEmail()">生成邮箱</button>
<p id="email"></p>

<button onclick="checkMail()">刷新收件箱</button>

<div id="inbox"></div>

<script>
let login = "";
let domain = "";

async function genEmail() {
    const res = await fetch("https://www.1secmail.com/api/v1/?action=genRandomMailbox&count=1");
    const data = await res.json();

    const email = data[0];
    document.getElementById("email").innerText = "邮箱: " + email;

    [login, domain] = email.split("@");
}

async function checkMail() {
    if (!login) {
        alert("请先生成邮箱！");
        return;
    }

    const res = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${login}&domain=${domain}`);
    const mails = await res.json();

    const inbox = document.getElementById("inbox");
    inbox.innerHTML = "";

    if (mails.length === 0) {
        inbox.innerHTML = "<p>暂无邮件</p>";
        return;
    }

    for (let mail of mails) {
        const detail = await fetch(
            `https://www.1secmail.com/api/v1/?action=readMessage&login=${login}&domain=${domain}&id=${mail.id}`
        );
        const content = await detail.json();

        const div = document.createElement("div");
        div.className = "mail";
        div.innerHTML = `
            <b>主题：</b>${content.subject}<br>
            <b>发件人：</b>${content.from}<br>
            <b>内容：</b>${content.textBody || content.htmlBody}
        `;
        inbox.appendChild(div);
    }
}
</script>

</body>
</html>
