<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>10分钟临时邮箱</title>
<style>
body {font-family: Arial; max-width: 800px; margin: 30px auto; background:#f7f9fc;}
.box {background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.email {font-size:18px;background:#f0f4f8;padding:10px;border-radius:6px;margin:10px 0;}
button {padding:8px 12px;margin-right:10px;border:none;background:#007bff;color:#fff;border-radius:6px;cursor:pointer;}
.mail {border-bottom:1px solid #eee;padding:10px 0;}
.time {color:#666;margin-bottom:10px;}
</style>
</head>

<body>
<div class="box">
<h2>10分钟临时邮箱（Emailnator版）</h2>

<div class="email" id="email">加载中...</div>
<div class="time" id="time">剩余：10:00</div>

<button onclick="copyEmail()">复制邮箱</button>
<button onclick="create()">换一个</button>

<div id="mails"></div>
</div>

<script>
let email = "";
let expire = 0;

// 创建邮箱（Emailnator）
async function create(){
    document.getElementById("mails").innerHTML="";

    // Emailnator API
    let res = await fetch("https://www.emailnator.com/generate-email", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            email: ["plusGmail"]
        })
    });

    let data = await res.json();
    email = data.email[0];

    document.getElementById("email").innerText = email;

    expire = Date.now() + 10*60*1000;

    timer();
    fetchMail();
}

// 收邮件
async function fetchMail(){
    if(!email) return;

    let res = await fetch("https://www.emailnator.com/message-list",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            email: email
        })
    });

    let data = await res.json();

    let html="";
    (data.messageData || []).forEach(m=>{
        html+=`
        <div class="mail">
            <b>${m.subject}</b><br>
            ${m.from}<br>
        </div>`;
    });

    document.getElementById("mails").innerHTML = html;

    setTimeout(fetchMail,5000);
}

// 倒计时
function timer(){
    let left = expire-Date.now();
    if(left<=0){
        document.getElementById("time").innerText="已过期";
        email="";
        return;
    }

    let m=Math.floor(left/60000).toString().padStart(2,"0");
    let s=Math.floor((left%60000)/1000).toString().padStart(2,"0");

    document.getElementById("time").innerText=`剩余：${m}:${s}`;

    setTimeout(timer,1000);
}

// 复制
function copyEmail(){
    navigator.clipboard.writeText(email);
    alert("已复制");
}

create();
</script>
</body>
</html>
